  /api/v1/sessions/{sessionId}/tasks/{taskId}/retry:
    post:
      description: Reset a failed task to in-progress status for re-execution. Task
        must be in failed status and not exceed retry limit.
      parameters:
      - description: Session ID (UUID format)
        in: path
        name: sessionId
        required: true
        schema:
          type: string
      - description: Task ID (UUID format)
        in: path
        name: taskId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/RetryTask'
                description: Retry options
                summary: body
        description: Retry options
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
          description: Task retry initiated successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Invalid request body, session ID, or task ID
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Session or task not found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Task cannot be retried (not failed or exceeded retry limit)
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Internal server error
      summary: Retry task
      tags:
      - tasks
