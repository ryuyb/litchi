  /api/v1/webhooks/github:
    post:
      description: Receives and processes GitHub webhook events with signature verification
      parameters:
      - description: GitHub webhook signature
        in: header
        name: X-Hub-Signature-256
        required: true
        schema:
          type: string
      - description: GitHub delivery ID
        in: header
        name: X-GitHub-Delivery
        required: true
        schema:
          type: string
      - description: GitHub event type (issues, issue_comment, pull_request, etc.)
        in: header
        name: X-GitHub-Event
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
          text/plain:
            schema:
              title: payload
              type: object
        description: GitHub webhook payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResp'
          description: Webhook processed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Invalid payload or missing headers
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Invalid signature
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
