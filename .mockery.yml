all: false
dir: '{{.InterfaceDir}}'
filename: mocks.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: 'Mock{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}'
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  github.com/ryuyb/litchi/internal/domain/repository:
    config:
      all: false
    interfaces:
      WorkSessionRepository: {}
      DesignRepository: {}
      AuditLogRepository: {}
      RepositoryRepository: {}
      CacheRepository: {}
  github.com/ryuyb/litchi/internal/domain/service:
    config:
      all: false
    interfaces:
      TaskScheduler: {}
      StageTransitionService: {}
      ComplexityEvaluator: {}
      EventDispatcher: {}
      SessionControlService: {}
      AgentRunner: {}
  github.com/ryuyb/litchi/internal/infrastructure/git:
    config:
      all: false
    interfaces:
      ConflictDetector: {}
      BranchService: {}