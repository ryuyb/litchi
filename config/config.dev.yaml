# Litchi Development Environment Configuration
#
# This file overrides base config values for development environment.
# Only specify values that differ from config.yaml.

server:
  mode: "debug"
  enable_swagger: true

database:
  host: "localhost"
  sslmode: "disable"
  max_open_conns: 50
  max_idle_conns: 5

logging:
  level: "debug"
  outputs:
    - type: "console"
      format: "console"
      console:
        stream: "stdout"
        color: true
  caller:
    enabled: true   # Show caller (file:line) for debugging
    skip: 1         # Skip wrapper frames to show actual caller

audit:
  enabled: false  # Disable audit in development

redis:
  enabled: false