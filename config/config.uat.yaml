# Litchi UAT Environment Configuration
#
# This file overrides base config values for UAT environment.
# Only specify values that differ from config.yaml.

server:
  mode: "release"
  enable_swagger: true  # Enable for testing

database:
  max_open_conns: 100
  sslmode: "require"

logging:
  level: "info"
  outputs:
    - type: "console"
      format: "json"
      console:
        stream: "stdout"
        color: false
    - type: "file"
      format: "json"
      path: "/var/log/litchi/app.log"
      rotation:
        enabled: true
        max_size: 100
        max_backups: 5
        max_age: 30
        compress: true

audit:
  enabled: true
  retention_days: 30

redis:
  enabled: true
  addr: "${REDIS_ADDR:localhost:6379}"